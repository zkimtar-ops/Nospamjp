<!DOCTYPE html>
​<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Safety Call Japan</title>
<link href="https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DCairo:wght%40400%3B700%26display%3Dswap" rel="stylesheet">
<link rel="stylesheet" href="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --primary: #c0392b; --bg: #f8f9fa; }
body {
margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
background: var(--bg); height: 100vh; overflow: hidden;
display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.container {
width: 85%; text-align: center; background: white;
padding: 40px 20px; border-radius: 30px;
box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
.shield-icon {
font-size: 80px; color: var(--primary); margin-bottom: 20px;
filter: drop-shadow(0 5px 15px rgba(192, 57, 43, 0.2));
}
h1 { font-size: 24px; color: #333; margin: 0; }
p { color: #777; font-size: 15px; line-height: 1.6; margin: 15px 0 30px; }
.status-badge {
background: #e8f5e9; color: #2e7d32; padding: 5px 15px;
border-radius: 20px; font-size: 14px; margin-bottom: 20px; display: inline-block;
}
.btn {
background: var(--primary); color: white; border: none;
padding: 16px 0; width: 100%; border-radius: 50px;
font-size: 18px; font-weight: bold; cursor: pointer;
box-shadow: 0 8px 20px rgba(192, 57, 43, 0.3);
transition: 0.3s;
}
.btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="container">
<div class="shield-icon"><i class="fas fa-shield-halved"></i></div>
<div class="status-badge" id="fb-status">جاري الاتصال بـ Firebase...</div>
<h1>Safety Call Japan</h1>
<p>نظام الحماية الذكي مفعل الآن.
يتم حظر المكالمات المزعجة تلقائياً.</p>
<button class="btn" onclick="checkUpdate()">تحديث القائمة السوداء</button>
</div>
