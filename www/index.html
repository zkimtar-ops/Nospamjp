<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>SOS Japan Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #0f172a; color: #38bdf8; }
        .status-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-top: 30px; }
        .green { color: #4ade80; }
    </style>
</head>

</html>
