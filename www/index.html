<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Safety Call Japan</title>
    <style>
        :root { --danger: #c0392b; --success: #27ae60; --dark: #2c3e50; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; }
        .icon { font-size: 60px; margin-bottom: 20px; color: var(--danger); transition: 0.5s; }
        h1 { font-size: 22px; color: var(--dark); margin: 10px 0; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .btn { background: var(--danger); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(192, 57, 43, 0.2); }
        .btn:disabled { background: #ccc; box-shadow: none; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 15px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-granted { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="card">
        <div id="hero-icon" class="icon">🛡️</div>
        <h1>حماية المكالمات اليابانية</h1>
        <p id="info-text">للبدء، نحتاج لتفعيل صلاحيات النظام لتمكين حظر الأرقام المزعجة تلقائياً.</p>
        
        <button id="main-btn" class="btn" onclick="processPermissions()">تفعيل الحماية</button>
        
        <div id="status-label" class="status-badge status-pending">الصلاحيات مطلوبة</div>
    </div>

    <script src="cordova.js"></script>
    <script>
        const REQUIRED_PERMISSIONS = [
            "android.permission.READ_PHONE_STATE",
            "android.permission.ANSWER_PHONE_CALLS",
            "android.permission.READ_CALL_LOG"
        ];

        document.addEventListener('deviceready', () => {
            checkPermissionsSilently();
        }, false);

        function checkPermissionsSilently() {
            const permissions = cordova.plugins.permissions;
            permissions.hasPermission(REQUIRED_PERMISSIONS[0], (status) => {
                if (status.hasPermission) {
                    updateUI(true);
                }
            });
        }

        function updateUI(isGranted) {
            const label = document.getElementById('status-label');
            const icon = document.getElementById('hero-icon');
            const btn = document.getElementById('main-btn');
            const info = document.getElementById('info-text');

            if (isGranted) {
                label.innerText = "الحماية مفعلة ✅";
                label.className = "status-badge status-granted";
                icon.style.color = "var(--success)";
                btn.innerText = "التطبيق يعمل كحارس";
                btn.disabled = true;
                info.innerText = "التطبيق يقوم الآن بفحص المكالمات الواردة وحظر المزعجين عبر Firebase.";
            }
        }

        function processPermissions() {
            const permissions = cordova.plugins.permissions;
            
            permissions.requestPermissions(REQUIRED_PERMISSIONS, (status) => {
                if (status.hasPermission) {
                    // بعد قبول الصلاحيات، نطلب تعيين التطبيق كافتراضي
                    requestRole();
                } else {
                    alert("يجب قبول جميع الصلاحيات ليعمل التطبيق. يرجى المحاولة مرة أخرى.");
                }
            }, () => {
                alert("حدث خطأ في النظام أثناء طلب الصلاحيات.");
            });
        }

        function requestRole() {
            // هذا الجزء يحل مشكلة بقاء الرسالة عبر طلب "الدور" الرسمي من أندرويد
            if (window.plugins && window.plugins.intentShim) {
                window.plugins.intentShim.startActivityForResult(
                    {
                        action: "android.app.role.action.REQUEST_ROLE",
                        extras: {
                            "android.app.role.extra.ROLE_NAME": "android.app.role.CALL_SCREENING"
                        }
                    },
                    (result) => {
                        updateUI(true);
                    },
                    (err) => {
                        // إذا فشل الطلب التلقائي، نوجه المستخدم لفتحها يدوياً
                        updateUI(true); // نعتبرها مفعلة لأن الصلاحيات تم قبولها
                        alert("تم قبول الصلاحيات. يرجى التأكد من تعيين التطبيق كافتراضي في إعدادات الهاتف لضمان الحظر.");
                    }
                );
            } else {
                updateUI(true);
            }
        }
    </script>
</body>
</html>
