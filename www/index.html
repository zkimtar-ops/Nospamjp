<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Safety Call Japan</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background: #f8f9fa; display: flex; align-items: center; 
            justify-content: center; height: 100vh; text-align: center;
        }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; }
        .icon { font-size: 60px; color: #c0392b; margin-bottom: 20px; }
        h1 { font-size: 22px; color: #333; margin-bottom: 10px; }
        .status-box { padding: 15px; border-radius: 10px; margin: 20px 0; font-weight: bold; }
        .waiting { background: #fff3cd; color: #856404; }
        .ready { background: #d4edda; color: #155724; }
        .btn { 
            background: #c0392b; color: white; border: none; padding: 15px; 
            border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Safety Call Japan</h1>
        <div id="status" class="status-box waiting">بانتظار تفعيل الصلاحيات...</div>
        <p style="color: #666; font-size: 14px;">يجب منح التطبيق صلاحية الوصول للمكالمات ليتمكن من حظر المزعجين عبر Firebase.</p>
        <button class="btn" onclick="askPermissions()">تفعيل الحماية الآن</button>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            console.log("التطبيق جاهز للعمل");
            checkCurrentPermissions();
        }, false);

        function checkCurrentPermissions() {
            var permissions = cordova.plugins.permissions;
            permissions.hasPermission(permissions.READ_PHONE_STATE, function(status) {
                if (status.hasPermission) {
                    updateUIStatus(true);
                }
            });
        }

        function updateUIStatus(isActive) {
            var st = document.getElementById('status');
            if (isActive) {
                st.innerText = "النظام يعمل بنجاح ✅";
                st.className = "status-box ready";
            }
        }

        function askPermissions() {
            var permissions = cordova.plugins.permissions;
            var list = [
                permissions.READ_PHONE_STATE,
                permissions.ANSWER_PHONE_CALLS,
                permissions.READ_CALL_LOG
            ];

            permissions.requestPermissions(list, function(status) {
                if (status.hasPermission) {
                    updateUIStatus(true);
                    alert("تم تفعيل الصلاحيات! تأكد من تعيين التطبيق كافتراضي في إعدادات الهاتف.");
                } else {
                    alert("تم رفض الصلاحيات. التطبيق لن يتمكن من حظر المكالمات.");
                }
            }, function() {
                alert("حدث خطأ تقني أثناء طلب الصلاحيات.");
            });
        }
    </script>
</body>
</html>
