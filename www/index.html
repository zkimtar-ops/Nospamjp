<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Call Japan</title>
    <style>
        :root { --primary: #c0392b; --success: #27ae60; --dark: #333; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; width: 88%; max-width: 400px; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; border: 1px solid #f0f0f0; }
        .status-icon { font-size: 70px; margin-bottom: 20px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        h1 { font-size: 24px; color: var(--dark); margin: 0 0 10px; }
        p { color: #777; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(192, 57, 43, 0.2); }
        .btn-action:active { transform: scale(0.96); }
        .btn-success { background: var(--success); box-shadow: 0 8px 20px rgba(39, 174, 96, 0.2); }
        #log-status { margin-top: 20px; font-size: 13px; color: #aaa; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <div id="ui-icon" class="status-icon">🛡️</div>
        <h1 id="ui-title">درع حماية اليابان</h1>
        <p id="ui-desc">اضغط على الزر لتفعيل الحماية الذكية. سيطلب منك النظام اختيار التطبيق كحامي افتراضي للمكالمات.</p>
        
        <button id="ui-btn" class="btn-action" onclick="initActivation()">تفعيل الحماية الآن</button>
        
        <div id="log-status">جاهز للبدء</div>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', checkStatus, false);

        function checkStatus() {
            // فحص صامت عند فتح التطبيق
            var permissions = cordova.plugins.permissions;
            permissions.hasPermission("android.permission.READ_PHONE_STATE", function(status) {
                if (status.hasPermission) {
                    setUIActive();
                }
            });
        }

        function initActivation() {
            var permissions = cordova.plugins.permissions;
            var list = [
                permissions.READ_PHONE_STATE,
                permissions.ANSWER_PHONE_CALLS,
                permissions.READ_CALL_LOG
            ];

            updateLog("جاري فحص الصلاحيات...");

            permissions.requestPermissions(list, function(status) {
                if (status.hasPermission) {
                    updateLog("تم قبول الصلاحيات ✅");
                    // الخطوة الحاسمة: طلب تعيين التطبيق كافتراضي
                    requestRole();
                } else {
                    updateLog("يرجى قبول كافة الصلاحيات ❌");
                }
            }, function() {
                updateLog("خطأ في الاتصال بالنظام");
            });
        }

        function requestRole() {
            updateLog("يرجى تعيين التطبيق كافتراضي...");
            
            // استدعاء نافذة النظام (تطلب إضافة Intent Plugin التي أضفناها لـ main.yml)
            if (window.plugins && window.plugins.intentShim) {
                window.plugins.intentShim.startActivityForResult(
                    {
                        action: "android.app.role.action.REQUEST_ROLE",
                        extras: {
                            "android.app.role.extra.ROLE_NAME": "android.app.role.CALL_SCREENING"
                        }
                    },
                    function() { 
                        setUIActive();
                        updateLog("الحماية نشطة تماماً ✅");
                    },
                    function() { 
                        updateLog("تنبيه: يجب الاختيار يدوياً ⚠️");
                        setUIActive(); // نحدث الواجهة على أي حال لأن الصلاحيات تم قبولها
                    }
                );
            } else {
                setUIActive();
            }
        }

        function setUIActive() {
            document.getElementById('ui-icon').innerText = "✅";
            document.getElementById('ui-icon').style.color = "var(--success)";
            document.getElementById('ui-title').innerText = "الحماية مفعلة";
            document.getElementById('ui-desc').innerText = "التطبيق يقوم الآن بفحص وحظر المكالمات المزعجة تلقائياً عبر Firebase.";
            document.getElementById('ui-btn').innerText = "تم التفعيل بنجاح";
            document.getElementById('ui-btn').classList.add('btn-success');
            document.getElementById('ui-btn').disabled = true;
            document.getElementById('log-status').innerText = "يعمل في الخلفية";
        }

        function updateLog(msg) {
            document.getElementById('log-status').innerText = msg;
        }
    </script>
</body>
</html>
