<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>SOS Japan Pro</title>
    
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--secondary-color);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 10px 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .status-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        #status-text {
            color: #7f8c8d;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            margin-bottom: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }

        #spam-list-container {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: none; /* مخفي افتراضياً */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .spam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .spam-item:last-child {
            border-bottom: none;
        }

        .number-label {
            font-weight: bold;
            font-size: 16px;
        }

        .badge {
            background: #ffebee;
            color: #c62828;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🇯🇵 SOS Japan Pro</h1>
            <p>نظام الحماية التلقائي من الأرقام المزعجة</p>
        </div>

        <div class="status-card">
            الحالة: <span id="status-text">جاري تهيئة النظام...</span>
        </div>

        <button class="btn btn-primary" id="btn-load">عرض القائمة السوداء</button>
        <p style="font-size: 12px; color: #95a5a6; text-align: center;">يتم تحديث البيانات لحظياً من Firebase</p>

        <div id="spam-list-container">
            <div id="list-content" class="loading-spinner">جاري الاتصال بالقاعدة...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="cordova.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
