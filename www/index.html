<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Safety Call Japan</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fdfdfd; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 85%; border: 2px solid #c0392b; }
        h1 { color: #c0392b; font-size: 22px; }
        .btn { background: #c0392b; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #status { margin-top: 20px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🛡️ حماية المكالمات</h1>
        <p>يجب الضغط على الزر أدناه ومنح كافة الصلاحيات لكي يعمل نظام الحظر من Firebase.</p>
        <button class="btn" onclick="activatePermissions()">تفعيل الحماية الآن</button>
        <div id="status"></div>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            // طلب الأذونات تلقائياً عند فتح التطبيق
            activatePermissions();
        }, false);

        function activatePermissions() {
            if (typeof cordova === 'undefined') return;
            var permissions = cordova.plugins.permissions;
            var list = [
                permissions.READ_PHONE_STATE,
                permissions.ANSWER_PHONE_CALLS,
                permissions.READ_CALL_LOG
            ];

            permissions.requestPermissions(list, function(status) {
                if (status.hasPermission) {
                    document.getElementById('status').innerText = "الحماية تعمل بنجاح ✅";
                    // تنبيه المستخدم بضرورة الإعداد اليدوي
                    console.log("Permissions granted");
                } else {
                    document.getElementById('status').innerText = "يرجى الموافقة على الصلاحيات ❌";
                }
            }, function() {
                alert("خطأ في تفعيل الإضافات");
            });
        }
    </script>
</body>
</html>
