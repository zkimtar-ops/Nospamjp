<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Safety Call Japan</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .btn { background: #c0392b; color: white; border: none; padding: 15px 25px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .status { margin: 20px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <h1>🛡️ Safety Call Japan</h1>
    <div class="status" id="status">جاري التحقق من الصلاحيات...</div>
    <p>يجب منح التطبيق كافة الأذونات ليعمل حظر المكالمات من Firebase.</p>
    <button class="btn" onclick="requestPermissions()">طلب الأذونات يدوياً</button>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            requestPermissions();
        }, false);

        function requestPermissions() {
            var permissions = cordova.plugins.permissions;
            var list = [
                permissions.READ_PHONE_STATE,
                permissions.ANSWER_PHONE_CALLS,
                permissions.READ_CALL_LOG
            ];

            permissions.requestPermissions(list, function(status) {
                if(status.hasPermission) {
                    document.getElementById('status').innerText = "الحماية مفعلة ✅";
                } else {
                    document.getElementById('status').innerText = "الصلاحيات مرفوضة ❌";
                }
            }, function() {
                document.getElementById('status').innerText = "حدث خطأ في طلب الأذونات";
            });
        }
    </script>
</body>
</html>
