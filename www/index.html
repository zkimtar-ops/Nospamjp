<!DOCTYPE html>
​<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Safety Call Japan</title>
<link href="https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DCairo:wght%40400%3B700%26display%3Dswap" rel="stylesheet">
<link rel="stylesheet" href="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --primary: #c0392b; --bg: #f8f9fa; }
body {
margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
background: var(--bg); height: 100vh; overflow: hidden;
display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.container {
width: 85%; text-align: center; background: white;
padding: 40px 20px; border-radius: 30px;
box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
.shield-icon {
font-size: 80px; color: var(--primary); margin-bottom: 20px;
}
h1 { font-size: 22px; color: #333; }
.status { color: #27ae60; font-weight: bold; margin: 10px 0; }
.btn {
background: var(--primary); color: white; border: none;
padding: 16px 0; width: 100%; border-radius: 50px;
font-size: 18px; font-weight: bold; cursor: pointer;
box-shadow: 0 8px 20px rgba(192, 57, 43, 0.3);
}
</style>
</head>
<body>
<div class="container">
<div class="shield-icon"><i class="fas fa-shield-halved"></i></div>
<h1>Safety Call Japan</h1>
<p class="status" id="st">جاري الفحص...</p>
<p>نظام الحماية الذكي مفعل الآن لحظر المزعجين.</p>
<button class="btn" onclick="alert('النظام يعمل بنجاح ✅')">تحديث الحالة</button>
</div>
<script src="cordova.js"></script>
<script>
document.addEventListener('deviceready', function() {
document.getElementById('st').innerText = "الحماية مفعلة ✅";
}, false);
</script>
</body>
</html>
