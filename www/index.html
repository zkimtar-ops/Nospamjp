<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Japan Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .setup-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 50px; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .btn-main { background-color: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:disabled { background-color: #ccc; }
        .instruction-box { background: #e7f3ff; padding: 15px; border-radius: 8px; text-align: right; margin-bottom: 20px; font-size: 14px; color: #004085; }
        .spam-list { margin-top: 20px; text-align: right; max-height: 200px; overflow-y: auto; }
        .spam-item { background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="main-app">
        <h2>SOS Japan Pro 🚫</h2>
        <div id="status-text" class="status-badge">جاري التحقق من الاتصال...</div>

        <div id="setup-section" class="setup-card">
            <h3>خطوات التفعيل</h3>
            <div class="instruction-box">
                1️⃣ وافق على شروط الاستخدام بالأسفل.<br>
                2️⃣ اضغط "تفعيل الحظر المباشر".<br>
                3️⃣ اختر <b>SOS Japan Pro</b> من القائمة التي ستظهر واضغط <b>Set as Default</b>.
            </div>
            
            <label style="display: block; margin-bottom: 20px;">
                <input type="checkbox" id="terms-check" onchange="toggleBtn()"> أوافق على شروط الاستخدام والخصوصية
            </label>

            <button id="activate-btn" class="btn-main" onclick="startActivation()" disabled>تفعيل الحظر المباشر</button>
        </div>

        <div class="spam-list" id="list-content">
            <p style="text-align: center;">قائمة الأرقام المحظورة ستظهر هنا...</p>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
