<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Japan Pro</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { background: #007bff; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn:disabled { background: #ccc; }
        .status { margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>إعدادات الحماية 🚫</h2>
        <div id="status-db" class="status">جاري فحص الاتصال...</div>
        
        <p style="text-align: right; font-size: 14px; color: #555;">
            لتشغيل الحظر، يجب تعيين التطبيق كـ <b>Default Spam App</b> في الصفحة التالية.
        </p>

        <label style="display: block; margin: 15px 0;">
            <input type="checkbox" id="terms" onchange="document.getElementById('go-btn').disabled = !this.checked">
            أوافق على منح كافة الصلاحيات للحماية
        </label>

        <button id="go-btn" class="btn" onclick="openDefaultApps()" disabled>الانتقال للإعدادات وتفعيل الحظر</button>
    </div>

    <script src="cordova.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
