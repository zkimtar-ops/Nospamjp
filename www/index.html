<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content:; style-src * 'self' 'unsafe-inline'; script-src * 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *;">
    <title>SOS Japan Pro</title>
    
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #d32f2f; margin-top: 0; }
        #status-text { font-weight: bold; margin: 15px 0; color: #666; }
        .list-container { background: white; border-radius: 15px; padding: 10px; text-align: right; min-height: 200px; }
        .spam-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .badge { background: #ff5252; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
        .btn-settings { background: #1976d2; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SOS Japan Final Pro</h1>
        <div id="status-text">جاري جلب البيانات من الفيرباس...</div>
        <button class="btn-settings" onclick="showSetupAlert()">إعدادات الحظر (مثل تروكولر)</button>
    </div>

    <div class="list-container">
        <h3 style="padding-right: 10px;">الأرقام المحظورة في اليابان 🇯🇵</h3>
        <div id="list-content">
            <p style="text-align:center; color:#999;">جاري تحميل القائمة...</p>
        </div>
    </div>

    <script src="cordova.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script src="js/index.js"></script>

</body>
</html>
