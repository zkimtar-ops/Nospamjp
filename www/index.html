<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSpam Japan - Anshin Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #c0392b; --success: #27ae60; --bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg); text-align: center; }
        .screen { display: flex; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .icon-hero { font-size: 80px; color: var(--primary); margin-bottom: 20px; }
        h1 { font-size: 26px; margin: 10px 0; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { 
            border: none; padding: 16px 30px; border-radius: 12px; 
            font-size: 18px; font-weight: 700; cursor: pointer; 
            width: 100%; max-width: 300px; background: var(--primary); color: white;
        }
        #status-msg { margin-top: 20px; font-weight: bold; color: var(--success); display: none; }
    </style>
</head>
<body>

    <div class="screen">
        <div class="icon-hero"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>تفعيل الحماية</h1>
        <p>يجب منح التطبيق الأذونات اللازمة وتعيينه كتطبيق افتراضي لكي يتمكن من حظر الأرقام المزعجة تلقائياً.</p>
        
        <button class="btn" onclick="requestAllPermissions()">تفعيل الأذونات الآن</button>
        <div id="status-msg">الحماية تعمل الآن ✅</div>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            console.log("Cordova is ready");
            // محاولة طلب الأذونات تلقائياً عند الفتح
            requestAllPermissions();
        }, false);

        function requestAllPermissions() {
            if (typeof cordova === 'undefined') return;

            var permissions = cordova.plugins.permissions;
            var list = [
                permissions.READ_PHONE_STATE,
                permissions.ANSWER_PHONE_CALLS,
                permissions.READ_CALL_LOG
            ];

            // 1. طلب أذونات الهاتف
            permissions.requestPermissions(list, function(status) {
                if (status.hasPermission) {
                    console.log("Permissions granted");
                    document.getElementById('status-msg').style.display = 'block';
                    
                    // 2. طلب تعيين التطبيق كافتراضي (هذا يظهر نافذة النظام)
                    if (window.AndroidInterface && window.AndroidInterface.requestDefaultCallerIdApp) {
                        window.AndroidInterface.requestDefaultCallerIdApp();
                    }
                } else {
                    alert("يجب قبول الأذونات لكي يعمل الحظر");
                }
            }, function() {
                alert("حدث خطأ أثناء طلب الأذونات");
            });
        }
    </script>
</body>
</html>
