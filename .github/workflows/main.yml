name: SOS Japan Final Success
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Everything
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع مع الحفاظ على ملفاتك
          mkdir -p my_app
          cordova create my_app com.nospam.japan "SOS Japan Pro"
          
          # 2. نسخ ملفاتك الأساسية (config.xml و www)
          if [ -f "config.xml" ]; then
            cp config.xml my_app/config.xml
          fi
          
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          
          cd my_app
          
          # 3. إضافة الإضافات الرسمية والمستقرة
          cordova plugin add cordova-plugin-dialogs
          cordova plugin add cordova-plugin-android-permissions
          
          # 4. بناء المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 5. إنشاء مفتاح التوقيع (JKS)
          keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 6. إنشاء ملف إعدادات البناء
          cat <<EOF > build.json
          { "android": { "release": { "keystore": "release.jks", "storePassword": "123456", "alias": "zakaria_key", "password": "123456" } } }
          EOF

          # 7. بناء APK
          cordova build android --release --device --buildConfig=build.json -- --packageType=apk
          
          # 8. بناء AAB (الطلب الإضافي)
          cordova build android --release --device --buildConfig=build.json -- --packageType=bundle
          
          # 9. استخراج الملفات للمجلد الرئيسي
          cd ..
          find my_app/platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ./SOS_Japan_Final_Pro.apk \;
          find my_app/platforms/android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} ./SOS_Japan_Final_Pro.aab \;
          cp my_app/release.jks ./release.jks

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Pro
          path: |
            *.apk
            *.aab
            release.jks
