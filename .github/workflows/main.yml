name: Safety_Call_Japan_Full_Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android App
        run: |
          # 1. تثبيت كوردوفا وتجهيز البيئة
          npm install -g cordova --no-audit
          rm -rf node_modules package-lock.json platforms plugins
          
          # 2. إنشاء مجلد المشروع والحفاظ على الاسم والهوية
          cordova create build_dir com.nospam.japan "Safety Call Japan"
          cp config.xml build_dir/config.xml
          mkdir -p build_dir/www
          cp -r www/* build_dir/www/
          [ -f "google-services.json" ] && cp google-services.json build_dir/google-services.json
          
          cd build_dir

          # 3. إضافة المنصة والإضافات الأصلية (التي طلبتها بدقة)
          cordova platform add android@13.0.0 --save
          cordova plugin add cordova-plugin-android-permissions --save
          cordova plugin add cordova-plugin-firebasex@16.1.0 --save
          cordova plugin add cordova-plugin-androidx-adapter --save
          cordova plugin add com-darryncampbell-cordova-plugin-intent --save
          
          cordova prepare android
          
          # 4. إنشاء مفتاح التوقيع الدائم (بنفس بيانات Zakaria)
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          # 5. إعداد ملف التوقيع البرمجي
          cat <<EOF > build.json
          {
              "android": {
                  "release": {
                      "keystore": "release.jks",
                      "storePassword": "123456",
                      "alias": "safety_key",
                      "password": "123456"
                  }
              }
          }
          EOF

          # 6. بناء التطبيق بصيغتي APK و AAB
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle

          # 7. استخراج الملفات للمجلد النهائي (خارج build_dir)
          mkdir -p ../output
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ../output/SafetyCall_Install.apk \;
          find platforms/android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} ../output/SafetyCall_PlayStore.aab \;
          cp release.jks ../output/safety_key.jks

      - name: Upload Full Package
        uses: actions/upload-artifact@v4
  
