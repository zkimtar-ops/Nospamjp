name: Safety_Japan_Final_Success_Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Force Extract
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مجلد المخرجات النهائي
          mkdir -p $GITHUB_WORKSPACE/FINAL_ARTIFACTS
          
          # 3. إنشاء المفتاح الرقمي (JKS) - ملاحظة: يفضل استخدامه مرة واحدة وحفظه
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12
          
          # نسخ المفتاح للمجلد النهائي للتحميل
          cp $GITHUB_WORKSPACE/release.jks $GITHUB_WORKSPACE/FINAL_ARTIFACTS/safety_key.jks

          # 4. إنشاء مشروع كوردوفا
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 5. نقل ملفاتك البرمجية إلى داخل المجلد المنشأ (myapp)
          # نستخدم -f للإجبار و -r للمجلدات
          cp -f config.xml myapp/config.xml
          cp -f index.html myapp/www/index.html
          cp -f google-services.json myapp/google-services.json || echo "Firebase file missing"
          
          # نسخ مجلد src الذي يحتوي على CallBlockerService.java
          if [ -d "src" ]; then
            cp -r src myapp/
            echo "Source directory copied successfully"
          else
            echo "Error: src directory not found!"
            exit 1
          fi
          
          cd myapp
          
          # 6. إضافة المنصة والإضافات
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          
          # 7. إعداد ملف التوقيع build.json
          echo "{\"android\": {\"release\": {\"keystore\": \"$GITHUB_WORKSPACE/release.jks\", \"storePassword\": \"123456\", \"alias\": \"safety_key\", \"password\": \"123456\"}}}" > build.json

          # 8. بناء APK
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          find platforms/android/app/build/outputs/apk/release -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/FINAL_ARTIFACTS/SafetyCall_Install.apk \;

          # 9. بناء AAB (للمتجر)
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find platforms/android/app/build/outputs/bundle/release -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/FINAL_ARTIFACTS/SafetyCall_PlayStore.aab \;

      - name: Upload Safety Package
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Build
          path: ${{ github.workspace }}/FINAL_ARTIFACTS/
