name: Safety_Japan_Call_Ultimate_V7

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Everything
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مشروع مؤقت لضمان هيكلية سليمة
          # ملاحظة: سيتم أخذ الـ Package ID من ملف config.xml الخاص بك تلقائياً
          cordova create myapp com.placeholder.id "Safety Japan"
          
          # 3. نسخ ملفاتك أنت إلى المشروع
          rm -rf myapp/www/*
          cp -r www/* myapp/www/
          cp config.xml myapp/config.xml
          
          # 4. نسخ ملف الفيرباس (مهم جداً للاتصال)
          if [ -f "google-services.json" ]; then
            cp google-services.json myapp/google-services.json
          fi

          cd myapp

          # 5. قبول تراخيص الأندرويد
          yes | sdkmanager --licenses || true

          # 6. إضافة المنصة والإضافات المطلوبة للفيرباس والحماية
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-firebasex
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-permissions
          
          # 7. إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria, O=SafetyJapan" -deststoretype pkcs12

          # 8. ملف إعدادات البناء (طريقتك المحترفة في V6)
          cat <<EOF > build.json
          {
              "android": {
                  "release": {
                      "keystore": "release.jks",
                      "storePassword": "123456",
                      "alias": "safety_key",
                      "password": "123456"
                  }
              }
          }
          EOF

          # 9. بناء APK و AAB
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          cordova build android --release --buildConfig=build.json -- --packageType=bundle

          # 10. تنظيم المخرجات للتحميل
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/Safety_Japan_Final.apk
          cp platforms/android/app/build/outputs/bundle/release/*.aab ../output/Safety_Japan_Final.aab
          cp release.jks ../output/safety_release.jks

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Full-Production-Package
          path: output/
