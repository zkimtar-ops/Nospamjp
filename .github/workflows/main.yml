name: Safety_Japan_Final_Success

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean and Build App
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء المجلد (أو استخدامه إذا كان موجوداً)
          cordova create build_dir com.nospam.japan "Safety Call Japan" || true
          
          # 3. نقل الملفات الأساسية
          [ -f "config.xml" ] && cp config.xml build_dir/config.xml
          mkdir -p build_dir/www
          if [ -f "index.html" ]; then
            cp index.html build_dir/www/index.html
          elif [ -d "www" ]; then
            cp -r www/* build_dir/www/
          fi
          [ -f "google-services.json" ] && cp google-services.json build_dir/google-services.json
          
          cd build_dir
          
          # 4. التراخيص والمنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0 || true
          
          # 5. الإضافات
          cordova plugin add cordova-plugin-firebasex@16.1.0 || true
          cordova plugin add cordova-plugin-androidx-adapter || true
          cordova plugin add cordova-plugin-android-permissions || true

          # 6. التوقيع الرقمي
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12 || true

          # 7. ملف build.json
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$(pwd)/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 8. البناء الفعلي
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk

          # 9. استخراج الملف (تعديل البحث للبحث في كامل مساحة العمل)
          mkdir -p ../output
          echo "جاري البحث عن ملف الـ APK واستخراجه..."
          # البحث من المجلد الرئيسي للمستودع لضمان إيجاد الملف أينما كان
          find $GITHUB_WORKSPACE -name "*release.apk" -exec cp {} ../output/Safety_Call_Japan.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-Production-APK
          path: output/Safety_Call_Japan.apk
