name: Safety_Japan_Ultimate_Package_Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build All Artifacts
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مفتاح التوقيع في المجلد الرئيسي
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12

          # 3. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 4. نقل الملفات
          [ -f "config.xml" ] && cp config.xml myapp/config.xml
          mkdir -p myapp/www
          if [ -d "www" ]; then cp -r www/* myapp/www/; else cp index.html myapp/www/index.html; fi
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          cd myapp
          
          # 5. التراخيص والمنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 6. إضافة الإضافات (الأذونات والفيرباس ثابتة)
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 7. إعداد ملف build.json
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$GITHUB_WORKSPACE/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 8. بناء APK أولاً ونقله فوراً لمكان آمن
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          mkdir -p ../dist
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ../dist/SafetyCall_Final.apk \;

          # 9. بناء AAB ونقله لمكان آمن
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find platforms/android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} ../dist/SafetyCall_Final.aab \;

          # 10. نسخ المفتاح
          cp $GITHUB_WORKSPACE/release.jks ../dist/safety_call_key.jks

      - name: Upload Safety Call Package
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Full-Package
          path: dist/
