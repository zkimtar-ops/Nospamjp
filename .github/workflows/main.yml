name: SOS_Japan_Final_Build_Working

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create and Build App
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء المجلد الأساسي للتطبيق
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 3. نسخ ملفاتك البرمجية داخل مجلد التطبيق
          cp config.xml myapp/config.xml
          cp -r www/* myapp/www/
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          # 4. الدخول للمجلد وتنفيذ البناء بداخله حصراً
          cd myapp
          
          # قبول التراخيص
          yes | sdkmanager --licenses || true
          
          # إضافة المنصة والإضافات
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 5. إنشاء مفتاح التوقيع داخل مجلد myapp
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 6. إنشاء ملف build.json داخل مجلد myapp
          echo '{"android": {"release": {"keystore": "release.jks", "storePassword": "123456", "alias": "safety_key", "password": "123456"}}}' > build.json

          # 7. البناء باستخدام الملف المحلي
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          
          # 8. استخراج النتيجة
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Package
          path: output/
