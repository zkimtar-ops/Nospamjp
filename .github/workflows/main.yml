name: Safety_Japan_Ultimate_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Full Build Process
        run: |
          npm install -g cordova
          
          # إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # نسخ ملفاتك
          cp config.xml myapp/config.xml
          cp -r www/* myapp/www/
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          cd myapp
          
          # قبول التراخيص
          yes | sdkmanager --licenses || true
          
          # إضافة المنصة
          cordova platform add android@13.0.0
          
          # إضافة الإضافات (بما في ذلك إضافة الصلاحيات للمطالبة بها داخل التطبيق)
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-androidx-adapter
          
          # إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # إعداد ملف البناء
          echo '{"android": {"release": {"keystore": "release.jks", "storePassword": "123456", "alias": "safety_key", "password": "123456"}}}' > build.json

          # بناء التطبيق APK
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall_Pro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Pro
          path: output/
