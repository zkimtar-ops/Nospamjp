name: Safety_Japan_Final_Success

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Process
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مجلد المخرجات
          mkdir -p $GITHUB_WORKSPACE/FINAL_ARTIFACTS
          
          # 3. إنشاء المشروع
          # نستخدم --template لضمان عدم وجود ملفات تعارض
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 4. نقل الملفات باستخدام المسار المطلق للمستودع $GITHUB_WORKSPACE
          # هذا يضمن أن النظام يجد الملف حتى لو تغير المجلد الحالي
          cp -f $GITHUB_WORKSPACE/config.xml myapp/config.xml
          cp -f $GITHUB_WORKSPACE/index.html myapp/www/index.html
          cp -f $GITHUB_WORKSPACE/google-services.json myapp/google-services.json || echo "Firebase file not found"
          
          # التأكد من نقل مجلد src الذي يحتوي على CallBlockerService.java
          if [ -d "$GITHUB_WORKSPACE/src" ]; then
            cp -r $GITHUB_WORKSPACE/src myapp/
          fi

          cd myapp
          
          # 5. إضافة المنصة (مهم جداً استخدام الإصدار 13 ليتوافق مع أندرويد الحديث)
          cordova platform add android@13.0.0
          
          # 6. إضافة الإضافات
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          
          # 7. بناء التطبيق (توقيع تلقائي مؤقت للتجربة)
          cordova build android --release -- --packageType=apk
          
          # 8. نقل الـ APK المخرج
          find platforms/android/app/build/outputs/apk/release -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/FINAL_ARTIFACTS/SafetyCall.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafetyCall-Package
          path: ${{ github.workspace }}/FINAL_ARTIFACTS/
