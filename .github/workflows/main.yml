name: Safety_Japan_Ultimate_Success_Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Extract
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء المفتاح الرقمي في المجلد الرئيسي للعمل
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12

          # 3. إنشاء مشروع نظيف في مجلد "myapp"
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 4. نقل ملفاتك (تأكد من وجودها في المستودع)
          cp config.xml myapp/config.xml
          mkdir -p myapp/www
          if [ -d "www" ]; then cp -r www/* myapp/www/; else cp index.html myapp/www/index.html; fi
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          # 5. إنشاء مجلد نهائي للمخرجات في المسار الرئيسي
          mkdir -p $GITHUB_WORKSPACE/OUTPUT_FILES
          
          cd myapp
          
          # 6. التراخيص والمنصة والإضافات
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          
          # 7. إعداد ملف التوقيع بمسار مطلق
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$GITHUB_WORKSPACE/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 8. بناء APK واستخراجه فوراً بالبحث في كل المجلدات الفرعية
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/OUTPUT_FILES/SafetyCall_Install.apk \;

          # 9. بناء AAB واستخراجه بالبحث في كل المجلدات الفرعية
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find . -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/OUTPUT_FILES/SafetyCall_PlayStore.aab \;

          # 10. نسخ المفتاح للمجلد النهائي
          cp $GITHUB_WORKSPACE/release.jks $GITHUB_WORKSPACE/OUTPUT_FILES/safety_key.jks

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Package
          # هنا المسار المضمون الذي يحتوي على الملفات الثلاثة
          path: OUTPUT_FILES/
          if-no-files-found: error
