name: Safety_Japan_Manual_Final_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 2. نسخ ملفاتك اليدوية (config, build, www) داخل المجلد
          cp config.xml myapp/config.xml
          cp build.json myapp/build.json
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          # مسح المجلد الافتراضي ونسخ واجهتك
          rm -rf myapp/www/*
          cp -r www/* myapp/www/

          cd myapp

          # 3. إعداد المنصة والإضافات
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-androidx-adapter

          # 4. توليد المفتاح (يجب أن يطابق بيانات build.json اليدوية)
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          # 5. البناء باستخدام ملف build.json اليدوي الذي نسخناه
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall_Final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-APK-Package
          path: output/
