name: Safety_Call_Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          npm install -g cordova
          cordova create build_dir com.nospam.japan "Safety Call"
          cp config.xml build_dir/config.xml
          mkdir -p build_dir/www
          cp -r www/* build_dir/www/
          [ -f "google-services.json" ] && cp google-services.json build_dir/google-services.json
          
          cd build_dir
          cordova platform add android@13.0.0
          
          # إضافات مهمة: الفيرباس والأذونات
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-android-permissions
          
          cordova build android --release -- --packageType=apk
          mkdir -p ../output
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ../output/SafetyCall.apk \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: APK-File
          path: output/SafetyCall.apk
