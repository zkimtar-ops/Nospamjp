name: Safety_Japan_Build_Final_v10

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # تم إزالة السطر الخاص بالـ cache لأنه يسبب الخطأ الذي واجهته

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build App
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع وتجهيز الملفات
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # نسخ ملفاتك إلى مجلد المشروع
          rm -rf myapp/www/*
          cp -r www/* myapp/www/
          cp config.xml myapp/config.xml
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json

          # 2. الدخول لمجلد المشروع لتنفيذ كافة العمليات بداخله
          cd myapp

          # قبول التراخيص
          yes | sdkmanager --licenses || true

          # إضافة المنصة والإضافات
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-android-permissions

          # 3. إنشاء مفتاح التوقيع داخل المجلد
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria, O=SafetyJapan" -deststoretype pkcs12

          # 4. إنشاء ملف build.json في المكان الصحيح
          echo '{"android": {"release": {"keystore": "release.jks", "storePassword": "123456", "alias": "safety_key", "password": "123456"}}}' > build.json

          # 5. البناء النهائي
          cordova build android --release --buildConfig=build.json -- --packageType=apk

          # نقل الملف النهائي للخارج للتحميل
          cp platforms/android/app/build/outputs/apk/release/*.apk ../SafetyCall_Final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-APK
          path: SafetyCall_Final.apk
