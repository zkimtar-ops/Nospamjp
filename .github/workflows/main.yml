name: Safety_Call_Japan_Full_Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android App
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova --no-audit
          
          # 2. إنشاء مشروع نظيف بنفس الهوية والاسم
          cordova create build_dir com.nospam.japan "Safety Call Japan"
          
          # 3. نقل الملفات الأساسية
          cp config.xml build_dir/config.xml
          mkdir -p build_dir/www
          cp -r www/* build_dir/www/
          [ -f "google-services.json" ] && cp google-services.json build_dir/google-services.json
          
          cd build_dir

          # 4. إضافة المنصة والإضافات المطلوبة (بدون تغيير الصلاحيات)
          cordova platform add android@13.0.0 --save
          cordova plugin add cordova-plugin-android-permissions --save
          cordova plugin add cordova-plugin-firebasex@16.1.0 --save
          cordova plugin add cordova-plugin-androidx-adapter --save
          cordova plugin add com-darryncampbell-cordova-plugin-intent --save
          
          cordova prepare android
          
          # 5. إنشاء مفتاح التوقيع (بيانات Zakaria)
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          # 6. ملف إعدادات البناء
          cat <<EOF > build.json
          {
              "android": {
                  "release": {
                      "keystore": "release.jks",
                      "storePassword": "123456",
                      "alias": "safety_key",
                      "password": "123456"
                  }
              }
          }
          EOF

          # 7. بناء التطبيق
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle

          # 8. استخراج الملفات (استخدام مسارات نسبية لضمان النجاح)
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall_Install.apk
          cp platforms/android/app/build/outputs/bundle/release/*.aab ../output/SafetyCall_PlayStore.aab
          cp release.jks ../output/safety_key.jks

      - name: Upload Full Package
        uses: actions/upload-artifact@v4
        with:
          name: SafeCall-Japan-Full-Package
          path: output/
