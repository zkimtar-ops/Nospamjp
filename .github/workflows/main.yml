name: Safety_Japan_Final_Success

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean and Build App
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء المشروع في مجلد منفصل لتجنب خطأ "Path already exists"
          cordova create build_dir com.nospam.japan "Safety Call Japan"
          
          # 3. نقل ملفاتك إلى مجلد البناء
          # نقل config.xml الخاص بك
          [ -f "config.xml" ] && cp config.xml build_dir/config.xml
          
          # نقل index.html إلى مجلد www داخل مجلد البناء
          mkdir -p build_dir/www
          if [ -f "index.html" ]; then
            cp index.html build_dir/www/index.html
          elif [ -d "www" ]; then
            cp -r www/* build_dir/www/
          fi
          
          # نقل ملف الفيرباس
          [ -f "google-services.json" ] && cp google-services.json build_dir/google-services.json
          
          # 4. الدخول لمجلد البناء لتنفيذ العمليات
          cd build_dir
          
          # قبول التراخيص وإضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 5. إضافة الإضافات الضرورية
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-android-permissions

          # 6. إنشاء مفتاح التوقيع داخل المجلد الحالي (المسار المطلق)
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          # 7. إنشاء ملف build.json يشير للمسار المطلق للمفتاح
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$(pwd)/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 8. البناء النهائي
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk

          # 9. استخراج الملف النهائي إلى الخارج
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/Safety_Call_Japan.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-Production-APK
          path: output/
