name: Safety_Japan_Final_Success

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean and Build App
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. تهيئة المجلد الرئيسي كمشروع كوردوفا (استخدام --force للسماح بالبناء في المجلد الحالي)
          # سنستخدم اسم البكج والاسم الذي تريده
          cordova create . com.nospam.japan "Safety Call Japan" --force
          
          # 3. التأكد من وجود المجلدات والملفات في مكانها الصحيح
          mkdir -p www
          # إذا كان index.html في الخارج، انقله للداخل لكي تراه كوردوفا
          [ -f "index.html" ] && mv index.html www/index.html
          
          # 4. قبول التراخيص وإضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 5. إضافة الإضافات الضرورية
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-android-permissions

          # 6. إنشاء مفتاح التوقيع في المجلد الرئيسي (Workspace Root)
          # استخدام $(pwd) يضمن أن المسار سيكون /home/runner/work/Nospamjp/Nospamjp/release.jks
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          # 7. إنشاء ملف build.json يشير للمسار المطلق للمفتاح
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$(pwd)/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 8. البناء النهائي - كوردوفا ستبحث عن build.json في المجلد الحالي
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk

          # 9. استخراج الملف النهائي
          mkdir -p output
          cp platforms/android/app/build/outputs/apk/release/*.apk output/Safety_Call_Japan.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-Production-APK
          path: output/
