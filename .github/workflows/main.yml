name: Safety_Japan_Ultimate_Build_Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Extract Package
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مجلد ثابت للمخرجات لضمان عدم الضياع
          mkdir -p $GITHUB_WORKSPACE/FINAL_ARTIFACTS
          
          # 3. إنشاء مفتاح التوقيع الرقمي
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12
          
          # نسخ المفتاح للمجلد النهائي
          cp $GITHUB_WORKSPACE/release.jks $GITHUB_WORKSPACE/FINAL_ARTIFACTS/safety_key.jks

          # 4. إنشاء مشروع نظيف تماماً
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # +++ أضف الأسطر التالية هنا مباشرة +++
          cp -r src myapp/src
          cp google-services.json myapp/google-services.json
          cp index.html myapp/www/index.html
          # +++++++++++++++++++++++++++++++++++++
          
          cd myapp
  
          
          # 5. نقل ملفاتك الأساسية
          cp config.xml myapp/config.xml
          mkdir -p myapp/www
          cp -r www/* myapp/www/
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          cd myapp
          
          # 6. قبول التراخيص وإضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 7. إضافة الإضافات (مهم جداً: إضافة Intent هي التي تحل مشكلة بقاء الرسالة)
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          
          # 8. إعداد ملف التوقيع البرمجي
          echo "{\"android\": {\"release\": {\"keystore\": \"$GITHUB_WORKSPACE/release.jks\", \"storePassword\": \"123456\", \"alias\": \"safety_key\", \"password\": \"123456\"}}}" > build.json

          # 9. بناء APK والبحث عنه في كل السيرفر لضمان إيجاده
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          find /home/runner/work/ -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/FINAL_ARTIFACTS/SafetyCall_Install.apk \;

          # 10. بناء AAB والبحث عنه
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find /home/runner/work/ -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/FINAL_ARTIFACTS/SafetyCall_PlayStore.aab \;

      - name: Upload Final Package
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Full-Package
          path: FINAL_ARTIFACTS/
