name: SOS_Japan_Complete_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Full Production Build
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 2. نقل ملفاتك
          cp config.xml myapp/config.xml
          mkdir -p myapp/www
          cp -r www/* myapp/www/
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          cd myapp
          
          # 3. قبول التراخيص وإضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 4. إضافة الإضافات (مهم جداً للصلاحيات والفيرباس)
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 5. إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 6. إعداد ملف البناء
          echo "{\"android\": {\"release\": {\"keystore\": \"$(pwd)/release.jks\", \"storePassword\": \"123456\", \"alias\": \"safety_key\", \"password\": \"123456\"}}}" > build.json

          # 7. البناء النهائي
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk
          
          # 8. استخراج الملف
          mkdir -p ../output
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ../output/SafetyCall_Final.apk \;

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-Production-APK
          path: output/SafetyCall_Final.apk
