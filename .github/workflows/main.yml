name: SOS Japan Auto Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign
        run: |
          npm install -g cordova
          
          # 1. تهيئة المشروع مباشرة في المجلد الرئيسي
          cordova create . com.nospam.japan "SOS Japan Pro" || true
          
          # 2. إضافة الإضافات الرسمية والمستقرة
          cordova plugin add cordova-plugin-dialogs
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-call-number
          cordova plugin add cordova-plugin-vibration
          
          # 3. بناء المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 4. إنشاء مفتاح التوقيع الرقمي (Keystore)
          keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 5. إنشاء ملف build.json (تم التأكد من المسار)
          cat <<EOF > build.json
          {
            "android": {
              "release": {
                "keystore": "release.jks",
                "storePassword": "123456",
                "alias": "zakaria_key",
                "password": "123456",
                "keystoreType": ""
              }
            }
          }
          EOF

          # 6. بناء واستخراج APK و AAB
          cordova build android --release --device --buildConfig=build.json -- --packageType=apk
          cordova build android --release --device --buildConfig=build.json -- --packageType=bundle
          
          # 7. تجهيز الملفات النهائية للتحميل
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ./SOS_Japan_Final.apk \;
          find platforms/android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} ./SOS_Japan_Final.aab \;

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Bundle
          path: |
            *.apk
            *.aab
            release.jks
            build.json
