name: Safety_Japan_Ultimate_Build_Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Process
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 2. نسخ ملفاتك داخل مجلد المشروع
          cp config.xml myapp/config.xml
          cp index.html myapp/www/index.html
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          cd myapp
          
          # 3. قبول التراخيص وإضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 4. إضافة الإضافات
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 5. إنشاء مفتاح التوقيع واستخدام مسار مطلق لتجنب ضياعه
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 6. إنشاء ملف build.json باستخدام المسار المطلق للمفتاح
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$(pwd)/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 7. بناء التطبيق مع توضيح المسار الكامل للملف (هذا هو الحل)
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk
          
          # 8. استخراج الملف النهائي
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall_Pro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Pro
          path: output/
