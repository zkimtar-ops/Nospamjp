name: Safety_Japan_Final_Success_All_Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All
        run: |
          npm install -g cordova
          
          # 1. إنشاء المفتاح في المجلد الرئيسي
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12

          # 2. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 3. نقل ملفاتك
          cp config.xml myapp/config.xml
          mkdir -p myapp/www
          if [ -d "www" ]; then cp -r www/* myapp/www/; else cp index.html myapp/www/index.html; fi
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          # مجلد المخرجات النهائي
          mkdir -p $GITHUB_WORKSPACE/FINAL_FILES
          
          cd myapp
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 4. تثبيت الإضافات (مهم جداً لظهور الأذونات)
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 5. إعداد ملف البناء
          echo "{\"android\": {\"release\": {\"keystore\": \"$GITHUB_WORKSPACE/release.jks\", \"storePassword\": \"123456\", \"alias\": \"safety_key\", \"password\": \"123456\"}}}" > build.json

          # 6. بناء APK
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/FINAL_FILES/SafetyCall.apk \;
          
          # 7. بناء AAB
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find platforms/android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/FINAL_FILES/SafetyCall.aab \;

          # 8. نسخ المفتاح
          cp $GITHUB_WORKSPACE/release.jks $GITHUB_WORKSPACE/FINAL_FILES/safety_key.jks

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-Package
          path: FINAL_FILES/
