name: Safety_Japan_Ultimate_Build_FINAL_VERSION

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build All Artifacts
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مفتاح التوقيع في المجلد الرئيسي فوراً
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.jks \
            -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=Zakaria" -deststoretype pkcs12

          # 3. إنشاء المشروع
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 4. نقل ملفاتك (الصلاحيات كاملة)
          [ -f "config.xml" ] && cp config.xml myapp/config.xml
          mkdir -p myapp/www
          if [ -d "www" ]; then cp -r www/* myapp/www/; else cp index.html myapp/www/index.html; fi
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json
          
          # 5. إنشاء مجلد "الخزنة" خارج مجلد البناء
          mkdir -p $GITHUB_WORKSPACE/FINAL_OUTPUT
          
          cd myapp
          
          # 6. التراخيص والمنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 7. إضافة الإضافات (الأذونات والفيرباس) - لن نحذف أي شيء
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          
          # 8. إعداد ملف build.json بمسار مطلق
          echo "{
            \"android\": {
              \"release\": {
                \"keystore\": \"$GITHUB_WORKSPACE/release.jks\",
                \"storePassword\": \"123456\",
                \"alias\": \"safety_key\",
                \"password\": \"123456\"
              }
            }
          }" > build.json

          # 9. بناء الـ APK ونقله فوراً للخزنة
          echo "Building APK..."
          cordova build android --release --buildConfig=build.json -- --packageType=apk
          # استخدام بحث شامل لضمان إيجاد الملف مهما كان مساره العميق
          find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/FINAL_OUTPUT/SafetyCall_Final.apk \;
          
          # 10. بناء الـ AAB ونقله فوراً للخزنة
          echo "Building AAB..."
          cordova build android --release --buildConfig=build.json -- --packageType=bundle
          find . -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/FINAL_OUTPUT/SafetyCall_Final.aab \;

          # 11. نسخ المفتاح للخزنة
          cp $GITHUB_WORKSPACE/release.jks $GITHUB_WORKSPACE/FINAL_OUTPUT/safety_call_key.jks

      - name: Upload Safety Call Package
        uses: actions/upload-artifact@v4
        with:
          name: Safety-Call-Japan-All-Files
          # الرفع من مجلد الخزنة الذي لا يمكن للأندرويد مسحه
          path: FINAL_OUTPUT/
          if-no-files-found: error
