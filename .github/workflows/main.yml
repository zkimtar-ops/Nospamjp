name: Safety_Call_AntiFailure_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Smart Build Execution
        run: |
          npm install -g cordova
          
          # 1. إنشاء المشروع في مجلد فرعي لضمان النظافة
          cordova create myapp com.nospam.japan "Safety Call Japan"
          
          # 2. فحص ونسخ الملفات (حل مشكلة cannot stat index.html)
          # إذا لم تجد المجلد، ستقوم بإنشائه
          mkdir -p myapp/www
          
          # نسخ ملف config.xml
          if [ -f "config.xml" ]; then cp config.xml myapp/config.xml; fi
          
          # نسخ index.html من أي مكان متاح أو إنشاء واحد افتراضي
          if [ -f "www/index.html" ]; then
            cp -r www/* myapp/www/
          elif [ -f "index.html" ]; then
            cp index.html myapp/www/index.html
          else
            echo "<html><body><h1>Default Index Created</h1></body></html>" > myapp/www/index.html
          fi
          
          # نسخ ملف الفيرباس
          [ -f "google-services.json" ] && cp google-services.json myapp/google-services.json

          cd myapp

          # 3. إعداد المنصة والإضافات
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # تثبيت الإضافات المطلوبة
          cordova plugin add cordova-plugin-firebasex@16.1.0
          cordova plugin add cordova-plugin-androidx-adapter
          cordova plugin add cordova-plugin-android-permissions
          
          # 4. التوقيع الرقمي (باستخدام مسارات مطلقة)
          keytool -genkey -v -keystore $(pwd)/release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          echo "{\"android\": {\"release\": {\"keystore\": \"$(pwd)/release.jks\", \"storePassword\": \"123456\", \"alias\": \"safety_key\", \"password\": \"123456\"}}}" > build.json

          # 5. البدء في البناء النهائي
          cordova build android --release --buildConfig=$(pwd)/build.json -- --packageType=apk
          
          # استخراج الملف للمجلد الرئيسي
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/release/*.apk ../output/SafetyCall_Final_Build.apk

      - name: Download Your APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-App-Package
          path: output/
